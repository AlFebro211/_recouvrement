<div class="dashboard-wrapper">
    <!-- HEADER SECTION -->
    <div class="dashboard-header">
        <div class="header-content">
            <h1>Tableau de Bord Financier</h1>
            <p class="subtitle">Suivi en temps réel de la situation de recouvrement</p>
        </div>
    </div>

    <!-- FILTERS TOOLBAR -->
    <div class="toolbar-filters">
        {% csrf_token %}
        <div class="filter-item">
            <label><i class="fas fa-calendar-alt"></i> Année</label>
            <select id="anneeFilter" class="custom-select">
                <option value="">Sélectionner</option>
                {% for a in annees %}
                <option value="{{a.id_annee}}">{{a}}</option>
                {% endfor %}
            </select>
        </div>

        <div class="filter-item">
            <label><i class="fas fa-school"></i> Classe</label>
            <select id="classeFilter" class="custom-select">
                <option value="">Toutes les classes</option>
            </select>
        </div>

        <div class="filter-item">
            <label><i class="fas fa-layer-group"></i> Trimestre</label>
            <select id="trimestreFilter" class="custom-select">
                <option value="">Tous</option>
            </select>
        </div>

        <div class="filter-item">
            <label><i class="fas fa-file-invoice-dollar"></i> Variable</label>
            <select id="variableFilter" class="custom-select">
                <option value="">Toutes</option>
            </select>
        </div>

        <div class="filter-item">
            <label><i class="fas fa-user-graduate"></i> Élève</label>
            <select id="eleveFilter" class="custom-select">
                <option value="">Tous les élèves</option>
            </select>
        </div>
    </div>

    <!-- MAIN KPIS -->
    <div class="kpi-grid">
        <div class="kpi-card stat-card" data-type="attendu">
            <div class="kpi-icon orange">
                <i class="fas fa-file-invoice"></i>
            </div>
            <div class="kpi-info">
                <span>Total Attendu</span>
                <h3 id="totalAttendu">0</h3>
            </div>
        </div>

        <div class="kpi-card stat-card" data-type="paye">
            <div class="kpi-icon emerald">
                <i class="fas fa-hand-holding-usd"></i>
            </div>
            <div class="kpi-info">
                <span>Montant Encaissé</span>
                <h3 id="montantPaye">0</h3>
            </div>
        </div>

        <div class="kpi-card stat-card" data-type="reste">
            <div class="kpi-icon red">
                <i class="fas fa-exclamation-triangle"></i>
            </div>
            <div class="kpi-info">
                <span>Reste à Percevoir</span>
                <h3 id="restePaye">0</h3>
            </div>
        </div>

        <div class="kpi-card stat-card" data-type="transactions">
            <div class="kpi-icon blue">
                <i class="fas fa-exchange-alt"></i>
            </div>
            <div class="kpi-info">
                <span>Transactions</span>
                <h3 id="totalPaiement">0</h3>
            </div>
        </div>
    </div>

    <!-- INSIGHTS SECTION -->
    <div class="insights-row">
        <!-- CHART COLUMN -->
        <div class="insight-card chart-container">
            <div class="card-header">
                <h4>Efficacité du Recouvrement</h4>
                <div class="recovery-badge" id="recoveryPercent">0%</div>
            </div>
            <div class="chart-wrapper">
                <canvas id="recoveryChart"></canvas>
            </div>
        </div>

        <!-- OTHER STATS COLUMN -->
        <div class="insight-card summary-container">
            <div class="card-header">
                <h4>Alertes & Anomalies</h4>
            </div>
            <div class="summary-list">
                <div class="summary-item stat-card" data-type="dette">
                    <div class="item-icon bg-soft-red"><i class="fas fa-users"></i></div>
                    <div class="item-text">
                        <span id="elevesDette">0</span>
                        <label>Élèves en Situation Débitrice</label>
                    </div>
                    <i class="fas fa-chevron-right arrow"></i>
                </div>

                <div class="summary-item stat-card" data-type="rejet">
                    <div class="item-icon bg-soft-gray"><i class="fas fa-times-circle"></i></div>
                    <div class="item-text">
                        <span id="totalRejete">0</span>
                        <label>Paiements Rejetés</label>
                    </div>
                    <i class="fas fa-chevron-right arrow"></i>
                </div>

                <div class="summary-item" style="cursor: default;">
                    <div class="item-icon bg-soft-blue"><i class="fas fa-info-circle"></i></div>
                    <div class="item-text">
                        <label>Dernière mise à jour</label>
                        <span style="font-size: 12px; color: #64748b;">À l'instant</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- MODAL DETAILS STATS (Preserved) -->
<div id="statsModal" class="stats-modal">
    <div class="stats-modal-content">
        <div class="stats-modal-header">
            <h3 id="modalTitle">Détails du Rapport</h3>
            <span id="closeModal">&times;</span>
        </div>
        <div class="modal-actions">
            <button id="downloadExcel" class="btn-export excel"><i class="fas fa-file-excel"></i> Excel</button>
            <button id="downloadPDF" class="btn-export pdf"><i class="fas fa-file-pdf"></i> PDF</button>
        </div>
        <div id="modalBody"></div>
    </div>
</div>

<!-- STYLES -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

    :root {
        --primary: #4f46e5;
        --primary-dark: #3730a3;
        --emerald: #10b981;
        --red: #ef4444;
        --orange: #f59e0b;
        --blue: #3b82f6;
        --slate-50: #f8fafc;
        --slate-100: #f1f5f9;
        --slate-200: #e2e8f0;
        --slate-600: #475569;
        --slate-700: #334155;
        --slate-900: #0f172a;
        --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
        --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1);
    }

    .dashboard-wrapper {
        margin-left: 280px;
        padding: 30px;
        background-color: var(--slate-50);
        min-height: 100vh;
        font-family: 'Inter', sans-serif;
        color: var(--slate-900);
    }

    /* HEADER */
    .dashboard-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 30px;
    }

    .dashboard-header h1 {
        font-size: 24px;
        font-weight: 700;
        margin: 0;
    }

    .dashboard-header .subtitle {
        color: var(--slate-600);
        margin: 4px 0 0;
    }

    /* TOOLBAR FILTERS */
    .toolbar-filters {
        background: white;
        padding: 20px;
        border-radius: 12px;
        display: flex;
        gap: 20px;
        box-shadow: var(--shadow-sm);
        margin-bottom: 30px;
        border: 1px solid var(--slate-200);
    }

    .filter-item {
        flex: 1;
        display: flex;
        flex-direction: column;
        gap: 6px;
    }

    .filter-item label {
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        color: var(--slate-600);
        letter-spacing: 0.5px;
    }

    .filter-item label i {
        margin-right: 5px;
        color: var(--primary);
    }

    .custom-select {
        padding: 10px;
        border: 1px solid var(--slate-200);
        border-radius: 8px;
        font-size: 13px;
        color: var(--slate-700);
        transition: all 0.2s;
        background-color: white;
    }

    .custom-select:focus {
        border-color: var(--primary);
        outline: none;
        box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
    }

    /* KPI GRID */
    .kpi-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 20px;
        margin-bottom: 30px;
    }

    .kpi-card {
        background: white;
        padding: 20px;
        border-radius: 12px;
        display: flex;
        align-items: center;
        gap: 15px;
        box-shadow: var(--shadow-sm);
        border: 1px solid var(--slate-200);
        transition: transform 0.2s, box-shadow 0.2s;
        cursor: pointer;
    }

    .kpi-card:hover {
        transform: translateY(-3px);
        box-shadow: var(--shadow-md);
    }

    .kpi-icon {
        width: 48px;
        height: 48px;
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 20px;
    }

    .kpi-info span {
        font-size: 13px;
        color: var(--slate-600);
        font-weight: 500;
        display: block;
        margin-bottom: 2px;
    }

    .kpi-info h3 {
        margin: 0;
        font-size: 24px;
        font-weight: 800;
        color: var(--slate-900);
        letter-spacing: -0.5px;
    }

    .emerald {
        background: #ecfdf5;
        color: var(--emerald);
    }

    .orange {
        background: #fffbeb;
        color: var(--orange);
    }

    .red {
        background: #fef2f2;
        color: var(--red);
    }

    .blue {
        background: #eff6ff;
        color: var(--blue);
    }

    /* INSIGHTS */
    .insights-row {
        display: grid;
        grid-template-columns: 1fr 1.5fr;
        gap: 20px;
        align-items: start;
    }

    .insight-card {
        background: white;
        padding: 24px;
        border-radius: 16px;
        border: 1px solid var(--slate-200);
        box-shadow: var(--shadow-sm);
        min-height: 380px;
        display: flex;
        flex-direction: column;
    }

    .card-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
        flex-shrink: 0;
    }

    .card-header h4 {
        margin: 0;
        font-size: 16px;
        font-weight: 600;
        color: var(--slate-700);
    }

    .chart-container {
        display: flex;
        flex-direction: column;
    }

    .chart-wrapper {
        position: relative;
        flex-grow: 1;
        width: 100%;
        min-height: 250px;
    }

    #recoveryChart {
        width: 100% !important;
        height: 100% !important;
    }

    .recovery-badge {
        background: var(--primary);
        color: white;
        padding: 4px 12px;
        border-radius: 20px;
        font-size: 14px;
        font-weight: 600;
    }

    /* SUMMARY LIST */
    .summary-list {
        display: flex;
        flex-direction: column;
        gap: 12px;
    }

    .summary-item {
        display: flex;
        align-items: center;
        padding: 12px;
        background: var(--slate-50);
        border-radius: 10px;
        gap: 12px;
        cursor: pointer;
        transition: 0.2s;
    }

    .summary-item:hover {
        background: var(--slate-100);
    }

    .item-icon {
        width: 36px;
        height: 36px;
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .item-text {
        flex: 1;
        display: flex;
        flex-direction: column;
    }

    .item-text span {
        font-size: 18px;
        font-weight: 800;
        color: var(--slate-900);
    }

    .item-text label {
        font-size: 13px;
        font-weight: 500;
        color: var(--slate-600);
    }

    .arrow {
        color: var(--slate-200);
        font-size: 12px;
    }

    .bg-soft-red {
        background: #fee2e2;
        color: #b91c1c;
    }

    .bg-soft-gray {
        background: #e2e8f0;
        color: #475569;
    }

    .bg-soft-blue {
        background: #dbeafe;
        color: #1d4ed8;
    }

    /* MODAL MODERNE */
    .stats-modal {
        position: fixed;
        inset: 0;
        background: rgba(15, 23, 42, 0.7);
        backdrop-filter: blur(8px);
        display: none;
        justify-content: center;
        align-items: center;
        z-index: 10000;
        padding: 20px;
    }

    .stats-modal-content {
        background: white;
        width: 1000px;
        max-width: 100%;
        max-height: 90vh;
        border-radius: 20px;
        overflow: hidden;
        display: flex;
        flex-direction: column;
    }

    .stats-modal-header {
        padding: 20px 30px;
        background: var(--slate-900);
        color: white;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .modal-actions {
        padding: 15px 30px;
        background: var(--slate-50);
        border-bottom: 1px solid var(--slate-200);
        display: flex;
        gap: 10px;
    }

    .btn-export {
        padding: 8px 16px;
        border-radius: 8px;
        border: none;
        font-weight: 600;
        font-size: 13px;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 8px;
    }

    .excel {
        background: #16a34a;
        color: white;
    }

    .pdf {
        background: #2563eb;
        color: white;
    }

    #modalBody {
        padding: 30px;
        overflow: auto;
    }

    /* Responsive */
    @media (max-width: 1200px) {
        .dashboard-wrapper {
            margin-left: 0;
        }

        .kpi-grid {
            grid-template-columns: repeat(2, 1fr);
        }

        .insights-row {
            grid-template-columns: 1fr;
        }

        .toolbar-filters {
            flex-wrap: wrap;
        }

        .filter-item {
            min-width: 180px;
        }
    }
</style>

<!-- SCRIPTS -->
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<script>
    $(document).ready(function () {

        // ==========================
        // INITIALISATION CHART
        // ==========================
        let recoveryChart;
        function initChart() {
            const ctx = document.getElementById('recoveryChart').getContext('2d');
            recoveryChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['Encaissé', 'Reste'],
                    datasets: [{
                        data: [0, 100],
                        backgroundColor: ['#10b981', '#f1f5f9'],
                        borderWidth: 0,
                        hoverOffset: 4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    cutout: '75%',
                    plugins: {
                        legend: { display: false }
                    }
                }
            });
        }
        initChart();

        function updateChart(paye, reste) {
            if (paye === 0 && reste === 0) {
                recoveryChart.data.datasets[0].data = [0, 100];
                $('#recoveryPercent').text('0%');
            } else {
                const total = paye + reste;
                const percent = total > 0 ? Math.round((paye / total) * 100) : 0;
                recoveryChart.data.datasets[0].data = [paye, reste];
                $('#recoveryPercent').text(percent + '%');
            }
            recoveryChart.update();
        }

        // ==========================
        // LOGIQUE DE DONNÉES
        // ==========================
        let currentStatsType = '';

        function formatMontant(montant) {
            return new Intl.NumberFormat('fr-FR', { minimumFractionDigits: 0, maximumFractionDigits: 0 }).format(montant) + ' F';
        }

        function getProfessionalTitle(type) {
            const titles = {
                'transactions': 'RAPPORT DES TRANSACTIONS FINANCIÈRES',
                'paye': 'ÉTAT DES ENCAISSEMENTS',
                'attendu': 'PRÉVISIONS DE RECETTES',
                'reste': 'SITUATION DES IMPAYÉS',
                'dette': 'LISTE DES ÉLÈVES EN SITUATION DÉBITRICE',
                'rejet': 'RELEVÉ DES PAIEMENTS REJETÉS'
            };
            return titles[type] || 'RAPPORT FINANCIER';
        }

        function resetDashboard() {
            $('#totalPaiement, #montantPaye, #totalAttendu, #restePaye, #elevesDette, #totalRejete').text('0');
            updateChart(0, 0);
        }

        function loadClasses(anneeId) {
            $('#classeFilter').html('<option value="">Toutes les classes</option>');
            $('#trimestreFilter').html('<option value="">Tous les trimestres</option>');
            $('#variableFilter').html('<option value="">Toutes les variables</option>');
            $('#eleveFilter').html('<option value="">Tous les élèves</option>');

            if (!anneeId) {
                resetDashboard();
                return;
            }

            fetch(`/get_classes_actives_with_paie/${anneeId}/`)
                .then(res => res.json())
                .then(data => {
                    if (data.success) {
                        data.classes.forEach(c => {
                            $('#classeFilter').append(`
                                <option value="${c.id_classe_active}"
                                    data-campus-id="${c.id_campus}"
                                    data-cycle-id="${c.id_cycle}">
                                    ${c.campus_nom} - ${c.classe_nom}${c.groupe ? ' (' + c.groupe + ')' : ''}
                                </option>
                            `);
                        });
                    }
                });
        }

        function loadDashboard() {
            const annee = $('#anneeFilter').val();
            const classe = $('#classeFilter').val() || '';
            const eleve = $('#eleveFilter').val() || '';
            const trimestre = $('#trimestreFilter').val() || '';
            const variable = $('#variableFilter').val() || '';

            if (!annee) {
                resetDashboard();
                return;
            }

            fetch(`/dashboard-data/?annee=${annee}&classe=${classe}&eleve=${eleve}&trimestre=${trimestre}&variable=${variable}`)
                .then(res => res.json())
                .then(data => {
                    if (!data.success) {
                        resetDashboard();
                        return;
                    }

                    const stats = data.stats;
                    // Formatage corrigé : Transactions et Rejets sont des nombres, pas des montants
                    $('#totalPaiement').text(stats.total_transactions || 0);
                    $('#montantPaye').text(formatMontant(stats.total_paye || 0));
                    $('#totalAttendu').text(formatMontant(stats.total_attendu || 0));
                    $('#restePaye').text(formatMontant(stats.reste_a_payer || 0));
                    $('#elevesDette').text(stats.eleves_en_dette || 0);
                    $('#totalRejete').text(stats.total_rejete || 0);

                    updateChart(parseFloat(stats.total_paye), parseFloat(stats.reste_a_payer));
                });
        }

        // EVENT HANDLERS
        $('#anneeFilter').on('change', function () {
            const anneeId = $(this).val();
            resetDashboard();
            loadClasses(anneeId);
            loadDashboard();
        });

        $('#classeFilter').on('change', function () {
            const opt = $(this).find(':selected');
            const selectedCampusId = opt.data('campus-id');
            const selectedCycleId = opt.data('cycle-id');
            const classeId = $(this).val();
            const anneeId = $('#anneeFilter').val();

            $('#trimestreFilter').html('<option value="">Tous</option>');
            $('#variableFilter').html('<option value="">Toutes</option>');
            $('#eleveFilter').html('<option value="">Tout</option>');

            if (!classeId || !anneeId) {
                loadDashboard();
                return;
            }

            fetch(`/get_trimestres_by_classe_active/?id_classe_active=${classeId}&id_annee=${anneeId}&id_campus=${selectedCampusId}&id_cycle=${selectedCycleId}`)
                .then(res => res.json())
                .then(data => {
                    if (data.success) {
                        data.trimestres.forEach(t => {
                            $('#trimestreFilter').append(`<option value="${t.id}">${t.nom}</option>`);
                        });
                    }
                    loadDashboard();
                });

            fetch(`/get_pupils_registred_classe/?id_campus=${selectedCampusId}&id_cycle=${selectedCycleId}&id_classe_active=${classeId}&id_annee=${anneeId}`)
                .then(res => res.json())
                .then(data => {
                    if (data.success) {
                        data.data.forEach(e => {
                            $('#eleveFilter').append(`<option value="${e.id_eleve}">${e.nom_complet}</option>`);
                        });
                    }
                });
        });

        $('#trimestreFilter').on('change', function () {
            const trimestreId = $(this).val();
            const anneeId = $('#anneeFilter').val();
            const classeOpt = $('#classeFilter').find(':selected');
            const selectedCampusId = classeOpt.data('campus-id');
            const selectedCycleId = classeOpt.data('cycle-id');
            const classeId = $('#classeFilter').val();

            $('#variableFilter').html('<option value="">Toutes</option>');

            if (!trimestreId || !anneeId || !classeId) {
                loadDashboard();
                return;
            }

            fetch(`/get-variables-by-trimestre/?id_trimestre=${trimestreId}&id_classe=${classeId}&id_annee=${anneeId}&id_campus=${selectedCampusId}&id_cycle=${selectedCycleId}`)
                .then(res => res.json())
                .then(data => {
                    if (data.success) {
                        data.variables.forEach(v => {
                            $('#variableFilter').append(`<option value="${v.id_variable}">${v.nom_variable}</option>`);
                        });
                    }
                    loadDashboard();
                });
        });

        $('#variableFilter, #eleveFilter').on('change', loadDashboard);

        // STAT CARDS (MODAL)
        $('.stat-card').on('click', function () {
            const type = $(this).data('type');
            currentStatsType = type;
            const annee = $('#anneeFilter').val();
            if (!annee) { alert('Veuillez sélectionner une année'); return; }

            const isCount = type === 'transactions' || type === 'rejet';

            $('#modalTitle').text(getProfessionalTitle(type));
            $('#modalBody').html('<div style="text-align:center;padding:50px;"><i class="fas fa-spinner fa-spin fa-2x" style="color:var(--primary)"></i><p>Chargement des détails...</p></div>');
            $('#statsModal').css('display', 'flex');

            const params = `?type=${type}&annee=${annee}&classe=${$('#classeFilter').val() || ''}&eleve=${$('#eleveFilter').val() || ''}&trimestre=${$('#trimestreFilter').val() || ''}&variable=${$('#variableFilter').val() || ''}`;

            fetch(`/dashboard-details/${params}`)
                .then(res => res.json())
                .then(data => {
                    if (!data.success || !data.rows || !data.rows.length) {
                        $('#modalBody').html('<p style="text-align:center;color:#666;">Aucune donnée disponible</p>');
                        return;
                    }

                    const showEleve = (type === 'dette' || type === 'paye') && type !== 'transactions';
                    let html = `<table class="modern-table">
                        <thead>
                            <tr>
                                <th>Classe</th>
                                ${showEleve ? '<th>Élève</th>' : ''}
                                <th>Variable</th>
                                <th style="text-align:right">${isCount ? 'Nombre' : 'Montant'}</th>
                            </tr>
                        </thead>
                        <tbody>`;

                    let total = 0;
                    data.rows.forEach(r => {
                        total += parseFloat(r.total || 0);
                        html += `<tr>
                            <td>${r.classe || '-'}</td>
                            ${showEleve ? `<td>${r.nom || '-'}</td>` : ''}
                            <td>${r.variable || '-'}</td>
                            <td style="text-align:right; font-weight:600; color:var(--primary)">
                                ${isCount ? (r.total || 0) : formatMontant(r.total || 0)}
                            </td>
                        </tr>`;
                    });

                    html += `<tr class="total-row">
                        <td colspan="${showEleve ? 3 : 2}" style="text-align:right">TOTAL GÉNÉRAL</td>
                        <td style="text-align:right" data-total="${total}">
                            ${isCount ? total : formatMontant(total)}
                        </td>
                    </tr></tbody></table>`;

                    $('#modalBody').html(html);
                });
        });

        $('#closeModal').on('click', () => $('#statsModal').fadeOut(200));

        // EXPORT EXCEL
        $('#downloadExcel').on('click', function () {
            const annee = $('#anneeFilter').val();
            if (!annee || !currentStatsType) return;
            window.open(`/export-dashboard-excel/?type=${currentStatsType}&annee=${annee}&classe=${$('#classeFilter').val() || ''}&eleve=${$('#eleveFilter').val() || ''}&trimestre=${$('#trimestreFilter').val() || ''}&variable=${$('#variableFilter').val() || ''}`, "_blank");
        });

        // EXPORT PDF
        $('#downloadPDF').on('click', function () {
            const table = $('#modalBody table');
            if (!table || !table.length) {
                alert('Aucune donnée à exporter');
                return;
            }

            const headers = [];
            table.find('thead th').each(function () {
                headers.push($(this).text().trim());
            });

            const rows = [];
            let totalGeneral = 0;

            table.find('tbody tr').not('.total-row').each(function () {
                const row = [];
                $(this).find('td').each(function () {
                    let text = $(this).text().trim();
                    text = text.replace(/[\sF]/g, '');
                    row.push(text);
                });
                if (row.length) rows.push(row);
            });

            const totalElement = table.find('.total-row td:last');
            totalGeneral = totalElement.data('total') || 0;

            const selectedOption = $('#classeFilter option:selected');
            const modalTitle = $('#modalTitle').text();

            const btn = $(this);
            const originalText = btn.html();
            btn.html('<i class="fas fa-spinner fa-spin"></i> Génération...').prop('disabled', true);

            fetch('/export-dashboard-pdf/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': $('input[name=csrfmiddlewaretoken]').val()
                },
                body: JSON.stringify({
                    title: modalTitle,
                    headers: headers,
                    rows: rows,
                    total: totalGeneral,
                    stats_type: currentStatsType,
                    id_campus: selectedOption.data('campus-id'),
                    id_cycle: selectedOption.data('cycle-id'),
                    id_annee: $('#anneeFilter').val(),
                    id_classe: $('#classeFilter').val(),
                    id_eleve: $('#eleveFilter').val()
                })
            })
                .then(response => {
                    if (!response.ok) throw new Error('Erreur réseau');
                    return response.blob();
                })
                .then(blob => {
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = modalTitle.replace(/\s+/g, '_') + '.pdf';
                    document.body.appendChild(a);
                    a.click();
                    window.URL.revokeObjectURL(url);
                })
                .catch(error => alert('Erreur lors de la génération du PDF'))
                .finally(() => btn.html(originalText).prop('disabled', false));
        });

        // Initial load
        loadDashboard();
    });
</script>
